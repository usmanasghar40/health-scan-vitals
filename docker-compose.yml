version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: health-scan-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: health_scan
    ports:
      - "5433:5432"
    volumes:
      - health_scan_pgdata:/var/lib/postgresql/data

volumes:
  health_scan_pgdata:
